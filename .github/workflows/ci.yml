name: Memory Orchestration CI/CD

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov
    
    - name: Run Complete Orchestration Tests
      run: |
        python test_complete_orchestration.py
    
    - name: Run Scenario Tests  
      run: |
        python test_scenarios_and_execution.py
    
    - name: Test Coverage Report
      run: |
        python -m pytest --cov=. --cov-report=xml --cov-report=html
    
    - name: Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  memory-system-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Validate Memory System Architecture
      run: |
        # Test CLDMEMORY Simple
        python cldmemory_simple.py --test
        
        # Test FORAI Daemon
        python unified_memory_forai_daemon.py --validate
        
        # Test MCP Orchestration
        python mcp_orchestration_coordinator.py --health-check

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Bandit Security Scan
      run: |
        pip install bandit
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Check for Secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  performance-benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run Performance Benchmarks
      run: |
        echo "🚀 Running Memory Orchestration Performance Tests"
        python test_complete_orchestration.py --benchmark
        
        echo "📊 Memory System Performance Metrics:"
        echo "- Target: 100% test pass rate"
        echo "- Target: <2s average response time"
        echo "- Target: 1000+ operations/minute"

  documentation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate Documentation
      run: |
        # Check dual-language README
        if ! grep -q "🇬🇧.*🇨🇿" README.md; then
          echo "❌ Dual-language header missing"
          exit 1
        fi
        
        # Validate claim of 100% test coverage
        if grep -q "100% PASS RATE" README.md; then
          echo "✅ Test coverage claims found - will be validated in test job"
        fi
        
        echo "✅ Documentation validation passed"